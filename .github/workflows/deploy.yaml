name: Deploy SAM Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME || 'siwe-infra' }}
      STAGE_NAME: ${{ vars.STAGE_NAME || 'prod' }}
      ASSUME_ROLE_ARN: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Build SAM application
        run: sam build

      - name: Validate SAM template
        run: sam validate --template .aws-sam/build/template.yaml

      - name: Deploy SAM stack
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "Missing required secret: JWT_SECRET"
            exit 1
          fi

          sam deploy \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides StageName="$STAGE_NAME" JwtSecret="$JWT_SECRET" \
            --resolve-s3 \
            --no-fail-on-empty-changeset
